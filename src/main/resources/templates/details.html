<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <div th:insert="links.html"></div>
</head>
<body>
<div th:insert="nav.html"></div>

<div class="container mt-3 ">
    <div class="row justify-content-center">
        <div class="col-6" th:object="${task}">
            <form method="post" action="/update">
                <input type="hidden" name="id" th:value="${task.id}">
                <div class="row mt-3">
                    <div class="col-12">
                        <label>NAME:</label>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <input type="text" name="name" class="form-control" th:value="${task.name}">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <label>DEADLINE DATE:</label>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <input type="text" name="deadlineDate" class="form-control" th:value="${task.deadlineDate}">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <label>IS COMPLETED:</label>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <input type="text" name="isCompleted" class="form-control" th:value="${task.isCompleted}">
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-12">
                        <button class="btn btn-sm btn-success">SAVE</button>
                    </div>
                </div>
            </form>

            <form method="post" action="/delete" class="mt-3" style="margin-left: 90px">
                <input type="hidden" th:value="${task.id}" name="id">
                <button class="btn btn-sm btn-danger">DELETE</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
