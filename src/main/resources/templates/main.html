<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <div th:insert="links.html"></div>
</head>
<body>
<div th:insert="nav.html"></div>

<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addTaskModal" style="background-color: #2F8F9E; color: white">
    + Add New Task
</button>

<div class="container mt-3">
    <div class="row">
        <div class="col-12">

            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>FULL NAME</th>
                    <th>DEADLINE DATE</th>
                    <th>IS COMPLETED</th>
                    <th>DETAILS</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="task :${tasks}">
                    <td th:text="${task.id}"></td>
                    <td th:text="${task.name}"></td>
                    <td th:text="${task.deadlineDate}"></td>
                    <td th:text="${task.isCompleted}"></td>
                    <td style="width: 7%"> <a th:href="@{'/details/' + ${task.id}}" class="btn btn-secondary btn-sm">DETAILS</a> </td>
<!--                    <td style="width: 7%"> <a th:href="@{'/details/' + ${st.id}}" class="btn btn-secondary btn-sm">DETAILS</a> </td>-->
                    <td ></td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>
</div>

<div class="modal fade" id="addTaskModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">New Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <form action="/add-task" method="post">

                    <div class="mb-3">
                        <label>TASK NAME</label>
                        <input type="text" class="form-control" name="name">
                    </div>

                    <div class="mb-3">
                        <label>TASK DESCRIPTION</label>
                        <textarea class="form-control" name="description"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>TASK DEADLINE DATE</label>
                        <input type="date" class="form-control" name="deadline">
                    </div>

                    <button class="btn btn-primary">Add Task</button>

                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
